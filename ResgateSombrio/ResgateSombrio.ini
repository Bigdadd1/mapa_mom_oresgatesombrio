description.Portuguese=Sua esposa foi sequestrada. \nEste cenário tem 3 finais possíveis.\nVocê conseguirá salvar sua esposa?\nOu encontrar o Final secreto?\n\nPS: O cenário orginal estava em arquivo no ludopedia e como o APP valkyrie foi atualizado essa missão foi perdida, portanto foi feito uma recuperação do mesmo, sendo corrigido o erro das imagens.\nTodo o resto foi mantido da maneira criada pelo autor.
description.Spanish=Tu esposa ha sido secuestrada. ¿Conseguirás salvarla? ¿Descubrirás acaso el final secreto? \n----------------------------------------------------\n Este escenario tiene 3 posibles finales. Se recomienda jugar con 1 o 2 investigadores. Es una aventura introductoria para jugadores novatos. \nTamaño máximo del mapa: 2x2.5 losetas cuadradas.\n-------------------------------------------------------------------\n Nota del autor: El escenario original estaba en un archivo de Ludopedia, y como la aplicación de Valkyrie fue actualizada, este escenario se perdió. Lo que he hecho ha sido recuperar el archivo y corregir unos errores que tenía con las imágenes. \n El resto se ha dejado tal y como lo creó el autor. \n----------------------------------------------------------\n Nota del traductor: Versión 2.0. Se han corregido numerosos errores del escenario y se ha actualizado la traducción. Agradecimientos especiales a Fernando Esra por su tiempo y buen hacer para arreglar todos los problemas técnicos que tenía este escenario.
description.Korean=\n당신의 아내가 납치되었습니다.\n아내를 구할 수 있겠습니까?\n\nPS : 본 시나리오는 ludopedia에 올라온 시나리오를 발키리 서버에 업데이트한 시나리오입니다.\n 원 제작자가 제작한 시나리오에서 이미지를 복구하고 오류 수정했습니다.\n
description.Polish=Twoja żona została porwana.\nCzy uda ci się ja uratować?\n\nTen scenariusz ma 3 możliwe zakończenia.\nCzy uda ci się odnaleźć sekretne zakończenie?
description.English=Your wife has been kidnapped. Will you manage to save her? Will you perhaps discover the secret ending? \n ---------------------------------------------------- \n This scenario has 3 possible endings. It is recommended for 1 or 2 investigators. This is an introductory adventure for novice players. \n Maximum map size: 2x2.5 square tiles. \n ------------------------------------------------------------------- \n Author's Note: The original scenario was on a Ludopedia file, and since the Valkyrie app was updated, this scenario was lost. What I have done is recover the file and correct some errors it had with the images. \n The rest has been left exactly as the author created it. \n ---------------------------------------------------------- \n Special thanks to Fernando Esra for his time and expertise in fixing all the technical issues this scenario had.
description.French=Votre épouse a été kidnappée. Réussirez-vous à la sauver ? Découvrirez-vous la fin secrète ? \n\n\n Ce scénario possède 3 fins possibles. Il est recommandé de jouer avec 1 ou 2 investigateurs. C'est une aventure d'introduction pour les joueurs débutants. \n\n P.S. : Le scénario original provenait d'un fichier Ludopedia, et comme l'application Valkyrie a été mise à jour, ce scénario a été perdu. Ce que j'ai fait, c'est récupérer le fichier et corriger quelques erreurs d'images. \n Le reste a été laissé tel que l'auteur l'avait créé. \n\n Version 2.0 : De nombreuses erreurs de scénario ont été corrigées et la traduction a été mise à jour. Remerciements spéciaux à Fernando Esra pour son temps et son expertise afin de régler tous les problèmes techniques de ce scénario.
