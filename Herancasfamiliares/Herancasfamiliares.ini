synopsys.French=Le suicide de Zadok Allen marque le début d'une série d'événements étranges et macabres. De 2 à 5 investigateurs.
description.Portuguese=O suicídio de Zadok Allen da inicio a uma sequência de eventos estranhos e macabros, os familiares estão todos no local do ocorrido e por algum motivo começam a demonstrar um comportamento suspeito devido sua presença na casa.\n\nVocê se vê preso em uma investigação bizarra onde cada detalhe é importante para a solução do mistério que envolve a família Allen.\n\nNão resta alternativa, que não seja descobrir a verdade e punir os culpados.\n\nPS_1:Este é um cenário mais investigativo com possíveis combates. É importante se atentar aos detalhes de texto, evidências e até mesmo posição de marcadores e locais de objetos.\n\nCaso queira, use um papel e caneta para anotar informações que considerar relevante.\n\nPS_2: número de investigadores recomendados 3 a 5, com 2 investigadores o cenário pode se tornar difícil.\n\nPS_3: O tempo de partida está sendo somado por algum ''bug'' do aplicativo. Considere o tempo colocado na tela de seleção de cenário.\n
description.Spanish=\n El suicidio de Zadok Allen da lugar a una cadena de sucesos extraños y macabros. Todos los familiares están en el lugar de los hechos y, por algún motivo, han comenzado a mostrar un comportamiento sospechoso debido a vuestra presencia en la mansión. \n\n Os veis envueltos en una desconcertante investigación donde cada detalle es importante para desentrañar el misterio que envuelve a la familia Allen. \n\n No queda otra alternativa que descubrir la verdad y que los responsables reciban su merecido castigo. \n\n <i>Nota 1: Éste es un escenario que se centra en la investigación, aunque puede tener algunos combates. Es importante prestar atención a los detalles del texto, las pruebas, e incluso la posición de las fichas y la localización de los objetos.  En cualquier caso, se aconseja el uso de papel y bolígrafo para anotar aquellas informaciones que se consideren relevantes. \n\n Nota 2: El número de Investigadores recomendado es de 3 a 5. Con 2 Investigadores el escenario se vuelve más difícil. \n\n Nota 3: El tiempo medio de duración de la partida parece tener algún tipo de error en la aplicación. Es mejor tener en cuenta el tiempo de duración indicado en la pantalla de selección de escenario. \n</i>-----------------------------------------------------\nTamaño máximo del mapa: 5x3,5 módulos cuadrados
description.French=\n Le suicide de Zadok Allen donne lieu à une chaîne d'événements étranges et macabres. Tous les membres de la famille sont sur les lieux et, pour une raison quelconque, ont commencé à montrer un comportement suspect en raison de votre présence dans le manoir. \n\n Vous vous retrouvez impliqué dans une enquête déconcertante où chaque détail est important pour démêler le mystère qui entoure la famille Allen. \n\n Il n'y a pas d'autre alternative que de découvrir la vérité et que les responsables reçoivent le châtiment qu'ils méritent. \n\n <i>Note 1 : Il s'agit d'un scénario axé sur l'investigation, bien qu'il puisse y avoir quelques combats. Il est important de prêter attention aux détails du texte, aux indices, et même à la position des pions et à la localisation des objets. \n\n Dans tous les cas, il est conseillé d'utiliser du papier et un stylo pour noter les informations jugées pertinentes. \n\n Note 2 : Le nombre d'investigateurs recommandé est de 3 à 5. À 2 investigateurs, le scénario devient plus difficile. \n\n Note 3 : Le temps moyen de durée de la partie semble comporter une erreur dans l'application. Il est préférable de se fier à la durée indiquée sur l'écran de sélection du scénario. \n
